services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alitaptap-backend-prod
    restart: always
    # TAILORED RAM LIMITS for your 482MB Available RAM
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    env_file:
      - ./backend/.env
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3